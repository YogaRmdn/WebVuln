{% extends 'lab/base.html' %}
{% block title %}{{ doc.title }}{% endblock %}
{% block content %}
<div class="vuln-tag">{{ doc.category }} — {{ doc.required_role }}</div>
<h1>{{ doc.title }}</h1>
<p class="muted" style="margin-bottom:1.5rem">Created: {{ doc.created_at }}</p>

<div class="card">
    {{ doc.content|linebreaks }}
</div>

<a href="{% url 'protected_index' %}" class="btn">&larr; Back to Protected Area</a>
{% endblock %}
